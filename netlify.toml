[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/live-matches"
  to = "/.netlify/functions/live-matches"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
